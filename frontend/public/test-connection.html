<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TianshangChat Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 10px; margin: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .success { color: green; }
        .error { color: red; }
        .url { font-weight: bold; color: #4a90e2; font-size: 1.2em; }
        code { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>TianshangChat Connection Test</h1>
    
    <div class="card">
        <h3>Server Status</h3>
        <div id="status">Testing...</div>
    </div>
    
    <div class="card">
        <h3>Your Connection</h3>
        <p>Your IP: <span id="clientIP">Detecting...</span></p>
        <p>Your User Agent: <span id="userAgent"></span></p>
    </div>
    
    <div class="card">
        <h3>Access URLs</h3>
        <p>Try these URLs on your mobile device:</p>
        <div id="urls"></div>
    </div>

    <script>
        document.getElementById('userAgent').textContent = navigator.userAgent;
        
        async function testConnection() {
            const urls = [
                'http://localhost:3000/api/health',
                'http://192.168.101.35:3000/api/health',
                'http://192.168.137.1:3000/api/health'
            ];
            
            let statusHtml = '';
            for (const url of urls) {
                try {
                    const response = await fetch(url, { method: 'GET', mode: 'no-cors' });
                    statusHtml += `<p class="success">✓ ${url} - Reachable</p>`;
                } catch (e) {
                    statusHtml += `<p class="error">✗ ${url} - Unreachable</p>`;
                }
            }
            document.getElementById('status').innerHTML = statusHtml;
        }
        
        async function getClientIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('clientIP').textContent = data.ip;
            } catch {
                document.getElementById('clientIP').textContent = 'Unable to detect (may be behind NAT)';
            }
        }
        
        function showURLs() {
            const ips = ['192.168.101.35', '192.168.137.1'];
            let html = '';
            for (const ip of ips) {
                html += `<p class="url">http://${ip}:5173</p>`;
            }
            html += `<p class="url">http://localhost:5173</p>`;
            document.getElementById('urls').innerHTML = html;
        }
        
        testConnection();
        getClientIP();
        showURLs();
    </script>
</body>
</html>
